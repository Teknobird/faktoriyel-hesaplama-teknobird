<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faktöriyel Hesaplama Aracı</title>
    <style>
        /* 1. Kaydırma çubuğunun (scroll) çıkmasını kesin olarak engelleyen CSS kuralları */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Dışarı taşan hiçbir şeyi gösterme, kaydırma çubuğunu yok et */
            background-color: transparent; /* WordPress arka planınızla uyumlu olması için */
            font-family: sans-serif;
        }

        /* Aracınızın ana kapsayıcısı */
        .container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }

        /* 
          Eğer kendi özel CSS stil kodlarınız varsa buraya ekleyebilirsiniz. 
          Önemli olan html ve body etiketlerinin 'overflow: hidden' kalmasıdır.
        */
    </style>
</head>
<body>

    <div class="container">
        <!-- 
          Sizin mevcut Faktöriyel Hesaplama HTML tasarımınız buraya gelecek.
          (Örnek olarak girdi alanları, butonlar ve sonuç alanı)
        -->
        
        <!-- Örnek Sonuç Alanı ve Kopyala Butonu Yapısı -->
        <!-- 
          ID değerlerinin aşağıdaki JS fonksiyonundaki tanımlamalarla 
          birebir uyuştuğundan emin olun.
        -->
    </div>

    <script>
        // 2. Kopyalama Fonksiyonu (Modern Tarayıcılar ve Mobil için Uyumlu)
        function kopyala() {
            // Sonucun yazıldığı HTML elemanının ID'sini buraya yazın (Örn: 'sonuc-alani')
            const sonucAlani = document.getElementById('sonuc-alani'); 
            const kopyalaButon = document.getElementById('kopyala-buton'); // Kopyalama butonu ID'si

            if (!sonucAlani) return;

            const sonucMetni = sonucAlani.innerText || sonucAlani.value;

            if (!sonucMetni) {
                alert("Kopyalanacak bir sonuç bulunamadı!");
                return;
            }

            // iframe içinde sorunsuz çalışabilmesi için modern Clipboard API kullanımı
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(sonucMetni)
                    .then(() => {
                        butonGeriBildirim(kopyalaButon);
                    })
                    .catch(err => {
                        console.error('Kopyalama hatası: ', err);
                        alternatifKopyalama(sonucMetni, kopyalaButon);
                    });
            } else {
                // SSL (HTTPS) olmayan veya desteklemeyen eski tarayıcılar için alternatif yöntem
                alternatifKopyalama(sonucMetni, kopyalaButon);
            }
        }

        // Eski/Kısıtlı tarayıcılar için yedek kopyalama fonksiyonu
        function alternatifKopyalama(text, buton) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.select();
            textArea.setSelectionRange(0, 99999); // Mobil cihazlar için seçme garantisi

            try {
                document.execCommand('copy');
                butonGeriBildirim(buton);
            } catch (err) {
                alert('Kopyalanamadı, lütfen metni manuel seçerek kopyalayın.');
            }
            document.body.removeChild(textArea);
        }

        // Butona tıklandığında "Kopyalandı!" geri bildirimi veren animasyon
        function butonGeriBildirim(buton) {
            if (!buton) return;
            const eskiMetin = buton.innerHTML;
            buton.innerHTML = "✓ Kopyalandı!";
            buton.style.backgroundColor = "#2ecc71"; // Butonu geçici olarak yeşil yapar
            
            setTimeout(() => {
                buton.innerHTML = eskiMetin;
                buton.style.backgroundColor = ""; // Eski orijinal rengine geri döner
            }, 2000);
        }
    </script>
</body>
</html>
